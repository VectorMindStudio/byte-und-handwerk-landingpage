    <!-- Logic Script: Lädt die Komponenten und initialisiert JS danach -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const includes = document.querySelectorAll('[data-include]');
            
            Promise.all(Array.from(includes).map(el => {
                const file = el.getAttribute('data-include');
                return fetch(file)
                    .then(res => {
                        if (!res.ok) throw new Error('Network error loading ' + file);
                        return res.text();
                    })
                    .then(data => {
                        el.outerHTML = data;
                    })
                    .catch(err => console.error(err));
            })).then(() => {
                initScripts();
                // Tailwind zwingen, die neu eingefügten Klassen zu scannen (wichtig bei modularem Aufbau!)
                if (typeof tailwind !== 'undefined') {
                    // Timeout gibt dem DOM Zeit, sich aufzubauen
                    setTimeout(() => {
                        document.body.style.display = 'none';
                        document.body.offsetHeight; // Reflow erzwingen
                        document.body.style.display = '';
                    }, 50);
                }
            });
        });

        function initScripts() {
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    const targetId = this.getAttribute('href');
                    if (targetId.startsWith('#') && window.location.pathname.endsWith('index.html') || window.location.pathname === '/') {
                        e.preventDefault();
                        const targetElement = document.querySelector(targetId);
                        if (targetElement) {
                            targetElement.scrollIntoView({ behavior: 'smooth' });
                            targetElement.setAttribute('tabindex', '-1');
                            targetElement.focus();
                        }
                    } else if (targetId.startsWith('#')) {
                        window.location.href = 'index.html' + targetId;
                    }
                });
            });

            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            const closeMobileMenuButton = document.getElementById('close-mobile-menu');
            
            if (mobileMenuButton && mobileMenu && closeMobileMenuButton) {
                mobileMenuButton.addEventListener('click', () => { 
                    mobileMenu.classList.remove('hidden'); 
                    mobileMenuButton.setAttribute('aria-expanded', 'true');
                    setTimeout(() => document.querySelector('#mobile-menu a').focus(), 100);
                });
                
                closeMobileMenuButton.addEventListener('click', () => { 
                    mobileMenu.classList.add('hidden'); 
                    mobileMenuButton.setAttribute('aria-expanded', 'false');
                    mobileMenuButton.focus(); 
                });
            }
        }

        function openTally() {
            const tallyId = 'w4bjdd'; // ECHTE ID EINTRAGEN
            if (typeof Tally !== 'undefined') {
                Tally.openPopup(tallyId, { layout: 'modal', width: 700, hideTitle: true });
            } else {
                window.open('https://tally.so/r/' + tallyId, '_blank');
            }
        }
    </script>
