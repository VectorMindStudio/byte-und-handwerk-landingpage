<section id="kontakt" aria-labelledby="contact-title" class="py-16 md:py-24 bg-white">
    <div class="container mx-auto px-6">
        <div class="max-w-4xl mx-auto text-center">
            <h2 id="contact-title" class="text-3xl font-bold text-center mb-4 text-gray-800">Lieber direkt Klartext reden?</h2>
            <p class="text-lg text-gray-700 mb-10 max-w-2xl mx-auto">
                Sie möchten den Digital-Check überspringen und gleich zur Sache kommen? Kein Problem. Suchen Sie sich hier einfach einen passenden Termin für ein kurzes 15-Minuten-Kennenlernen aus. Wir besprechen direkt und ohne Umwege, wo in Ihrem Betrieb aktuell der Schuh drückt.
            </p>
            
            <!-- Cal element-click embed button -->
            <button data-cal-link="byteundhandwerk/kennenlernen" 
                    data-cal-namespace="kennenlernen"

                    class="bg-secondary-blue text-white font-bold py-4 px-10 rounded-full text-xl hover:bg-blue-800 transition duration-300 transform hover:scale-105 shadow-xl inline-block cursor-pointer focus:outline-none focus-visible:ring-4 focus-visible:ring-accent-yellow">
                <i class="far fa-calendar-alt mr-2" aria-hidden="true"></i> Jetzt Termin auswählen
            </button>
            
        </div>
    </div>
